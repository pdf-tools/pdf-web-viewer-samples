<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theming: Built-in Themes</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; }
      .controls {
        padding: 12px;
        background: #f5f5f5;
        border-bottom: 1px solid #ddd;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .controls button {
        padding: 8px 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        background: white;
      }
      .controls button:hover { background: #e0e0e0; }
      .controls button.active { background: #007bff; color: white; border-color: #007bff; }
      #status { margin-left: auto; font-size: 14px; color: #666; }
      #viewer-container { width: 100vw; height: calc(100vh - 53px); }
    </style>
  </head>
  <body>
    <div class="controls">
      <button id="btn-light">Light</button>
      <button id="btn-dark">Dark</button>
      <button id="btn-auto">Auto</button>
      <span id="status">Current theme: -</span>
    </div>
    <div id="viewer-container"></div>
  </body>
</html>
